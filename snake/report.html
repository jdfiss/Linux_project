<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>問題回報</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111217;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    color: #e0e0e0;
    padding: 24px;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
  }
  h1 {
    font-size: 1.1rem;
    color: #f46800;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 0.78rem;
    color: #888;
    margin-bottom: 5px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  input, textarea, select {
    width: 100%;
    background: #111217;
    border: 1px solid #2a2d3a;
    border-radius: 4px;
    color: #e0e0e0;
    padding: 9px 12px;
    font-size: 0.88rem;
    font-family: inherit;
    outline: none;
    margin-bottom: 16px;
  }
  input:focus, textarea:focus, select:focus { border-color: #f46800; }
  textarea { min-height: 120px; resize: vertical; }
  select option { background: #1a1d27; }
  button {
    width: 100%;
    background: #f46800;
    border: none;
    border-radius: 4px;
    color: #fff;
    padding: 10px;
    font-size: 0.9rem;
    cursor: pointer;
    letter-spacing: 1px;
  }
  button:hover { background: #d45800; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 0.85rem;
    text-align: center;
  }
  #status.ok   { background: #1a2e1a; color: #4caf50; border: 1px solid #2d5a2d; }
  #status.fail { background: #2e1a1a; color: #f46800; border: 1px solid #5a2d2d; }
  .back {
    display: inline-block;
    margin-top: 18px;
    font-size: 0.78rem;
    color: #555;
    text-decoration: none;
    letter-spacing: 1px;
  }
  .back:hover { color: #f46800; }
  .divider { border: none; border-top: 1px solid #2a2d3a; margin: 24px 0; }

  /* log section */
  .log-title {
    font-size: 0.78rem;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .log-row {
    padding: 8px 0;
    border-bottom: 1px solid #1e2130;
    font-size: 0.8rem;
  }
  .log-row:last-child { border-bottom: none; }
  .log-meta { color: #555; font-size: 0.72rem; margin-bottom: 2px; }
  .log-msg  { color: #ccc; }
  .log-empty { color: #444; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="card">
  <h1>🐛 回報問題</h1>
  <p class="subtitle">發現任何 bug 或異常？填寫後直接通知管理員。</p>

  <label>你的名字（選填）</label>
  <input type="text" id="reporter" placeholder="匿名" maxlength="30" />

  <label>問題類型</label>
  <select id="category">
    <option value="遊戲 bug">遊戲 bug</option>
    <option value="系統異常">系統異常</option>
    <option value="排行榜問題">排行榜問題</option>
    <option value="其他">其他</option>
  </select>

  <label>問題描述 *</label>
  <textarea id="message" placeholder="請描述你遇到的問題，越詳細越好…"></textarea>

  <button id="submit-btn">送出回報</button>
  <div id="status"></div>
  <a class="back" href="/">← 回到首頁</a>

  <hr class="divider">

  <div class="log-title">最近回報紀錄</div>
  <div id="log"><div class="log-empty">載入中…</div></div>
</div>

<script>
const API = 'http://localhost:5000';

const submitBtn = document.getElementById('submit-btn');
const statusEl  = document.getElementById('status');

submitBtn.addEventListener('click', async () => {
  const message  = document.getElementById('message').value.trim();
  const reporter = document.getElementById('reporter').value.trim() || '匿名';
  const category = document.getElementById('category').value;

  if (!message) {
    showStatus('fail', '請填寫問題描述');
    return;
  }

  submitBtn.disabled = true;
  showStatus(null, '');

  try {
    const res = await fetch(`${API}/api/report`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `[${category}] ${message}`, reporter })
    });
    const json = await res.json();
    if (json.ok) {
      showStatus('ok', '✓ 已傳送！感謝你的回報，管理員會盡快處理。');
      document.getElementById('message').value = '';
      loadLog();
    } else {
      throw new Error();
    }
  } catch {
    showStatus('fail', '傳送失敗，請確認網路連線後再試。');
  } finally {
    submitBtn.disabled = false;
  }
});

function showStatus(type, text) {
  statusEl.className = type || '';
  statusEl.textContent = text;
  statusEl.style.display = text ? 'block' : 'none';
}

async function loadLog() {
  try {
    const res  = await fetch(`${API}/api/reports`);
    const rows = await res.json();
    const el   = document.getElementById('log');
    if (!rows.length) { el.innerHTML = '<div class="log-empty">還沒有回報紀錄</div>'; return; }
    el.innerHTML = rows.map(r => `
      <div class="log-row">
        <div class="log-meta">${r.reporter} · ${r.created_at}</div>
        <div class="log-msg">${escHtml(r.message)}</div>
      </div>`).join('');
  } catch {
    document.getElementById('log').innerHTML = '<div class="log-empty">無法載入紀錄</div>';
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadLog();
</script>
</body>
</html>
